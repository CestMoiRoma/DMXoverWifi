<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DMX over WiFi</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>DMX over WiFi</h1>
  <nav>
    <button data-view="home" class="nav-btn active">Home</button>
    <button data-view="devices" class="nav-btn">Device Manager</button>
    <button data-view="settings" class="nav-btn">Settings</button>
  </nav>
</header>

<main>
  <section id="view-home" class="view active"></section>

  <section id="view-devices" class="view">
    <div class="section">
      <h2>Devices</h2>
      <div id="device-list"></div>
    </div>

    <div class="section">
      <h2>New device</h2>
      <form id="device-form" class="form-stacked">
        <div class="field">
          <label for="device-name">Name</label>
          <input type="text" id="device-name" name="name" required>
        </div>
        <div class="field">
          <label for="device-start">Start channel</label>
          <input type="number" id="device-start" name="start_channel" min="1" max="512" required>
        </div>
        <div class="channels-block">
          <div class="channels-block-header">
            <span>Channels</span>
            <button type="button" id="add-channel-row" class="secondary small">+ channel</button>
          </div>
          <div id="channel-rows"></div>
        </div>
        <div class="form-actions">
          <button type="submit">Create device</button>
        </div>
      </form>
    </div>
  </section>

  <section id="view-settings" class="view">
    <div class="section">
      <h2>WiFi</h2>
      <div id="wifi-list"></div>
      <form id="wifi-form" class="form-inline">
        <input type="text" name="ssid" placeholder="SSID" required list="wifi-scan-results">
        <datalist id="wifi-scan-results"></datalist>
        <input type="password" name="password" placeholder="Password">
        <input type="number" name="priority" placeholder="Priority" value="0">
        <div class="form-actions">
          <button type="submit">Add</button>
          <button type="button" id="wifi-scan-btn" class="secondary">Scan</button>
        </div>
      </form>
    </div>

    <div class="section">
      <h2>MQTT</h2>
      <form id="mqtt-form" class="form-stacked">
        <div class="field field-inline">
          <input type="checkbox" id="mqtt-enabled" name="enabled">
          <label for="mqtt-enabled">Enabled</label>
        </div>
        <div class="field">
          <label for="mqtt-host">Broker host</label>
          <input type="text" id="mqtt-host" name="host">
        </div>
        <div class="field">
          <label for="mqtt-port">Port</label>
          <input type="number" id="mqtt-port" name="port" value="1883">
        </div>
        <div class="field">
          <label for="mqtt-username">Username</label>
          <input type="text" id="mqtt-username" name="username">
        </div>
        <div class="field">
          <label for="mqtt-password">Password</label>
          <input type="password" id="mqtt-password" name="password">
        </div>
        <div class="field">
          <label for="mqtt-base">Base topic</label>
          <input type="text" id="mqtt-base" name="base_topic">
        </div>
        <div class="field">
          <label for="mqtt-discovery">Discovery prefix</label>
          <input type="text" id="mqtt-discovery" name="discovery_prefix">
        </div>
        <div class="form-actions">
          <button type="submit">Save</button>
        </div>
      </form>
    </div>

    <div class="section">
      <h2>System</h2>
      <form id="system-form" class="form-stacked">
        <div class="field">
          <label for="sys-tx">DMX TX pin</label>
          <input type="text" id="sys-tx" name="dmx_tx_pin">
        </div>
        <div class="field field-inline">
          <input type="checkbox" id="sys-dir-enable" name="dmx_dir_pin_enabled">
          <label for="sys-dir-enable">Enable DE/RE direction pin
            <span class="hint">(leave off if DE+RE are tied to VCC)</span></label>
        </div>
        <div class="field">
          <label for="sys-dir">DE/RE pin</label>
          <input type="text" id="sys-dir" name="dmx_dir_pin">
        </div>
        <div class="field">
          <label for="sys-hostname">Hostname</label>
          <input type="text" id="sys-hostname" name="hostname">
        </div>
        <div class="field">
          <label for="sys-ap-ssid">Config hotspot SSID</label>
          <input type="text" id="sys-ap-ssid" name="ap_ssid">
        </div>
        <div class="field">
          <label for="sys-ap-pass">Config hotspot password</label>
          <input type="password" id="sys-ap-pass" name="ap_password">
        </div>
        <div class="field">
          <label for="sys-ap-ip">Config hotspot IP</label>
          <input type="text" id="sys-ap-ip" name="ap_ip">
        </div>
        <div class="form-actions">
          <button type="submit">Save</button>
        </div>
      </form>
    </div>

    <div class="section">
      <h2>Parent/Child mode <span class="hint">(WIP - not active yet)</span></h2>
      <form id="mesh-form" class="form-stacked">
        <div class="field">
          <label for="mesh-role">Role</label>
          <select id="mesh-role" name="role">
            <option value="none">None</option>
            <option value="parent">Parent</option>
            <option value="child">Child</option>
          </select>
        </div>
        <div class="field">
          <label for="mesh-ssid">Mesh SSID (hidden)</label>
          <input type="text" id="mesh-ssid" name="ssid">
        </div>
        <div class="field">
          <label for="mesh-pass">Mesh password</label>
          <input type="password" id="mesh-pass" name="password">
        </div>
        <div class="form-actions">
          <button type="submit">Save</button>
        </div>
      </form>
    </div>
  </section>
</main>

<script src="/app.js"></script>
</body>
</html>
